<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tomato Harvest PoC</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Tomato Harvest PoC</p>
          <h1>Isaac Sim 初心者向け収穫シミュレータ</h1>
          <p id="help-text" class="help-text"></p>
        </div>
        <div class="controls">
          <button id="harvest-button" type="button">Harvest Start</button>
          <button id="reset-button" type="button" class="secondary">Reset Scene</button>
        </div>
      </header>

      <main class="layout">
        <aside class="panel">
          <h2>Stage</h2>
          <div id="stage"></div>
        </aside>

        <section class="panel panel-main">
          <div class="panel-heading">
            <h2>Viewport</h2>
            <span id="status-chip" class="status-chip">Loading</span>
          </div>
          <div id="viewport" class="visual-panel"></div>
        </section>

        <aside class="panel">
          <h2>Camera</h2>
          <div id="camera" class="visual-panel visual-panel-small"></div>
        </aside>
      </main>

      <section class="bottom-grid">
        <article class="panel">
          <h2>Result</h2>
          <p id="result-message" class="result-message"></p>
          <p id="failure-reason" class="failure-reason"></p>
          <p id="attempt-count" class="attempt-count"></p>
        </article>
        <article class="panel">
          <h2>Runtime Log</h2>
          <ul id="log-list" class="log-list"></ul>
        </article>
      </section>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
