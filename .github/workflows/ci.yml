name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-self-hosted-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-e2e:
    name: Unit And Isaac E2E
    runs-on: [self-hosted, linux, x64, gpu]
    timeout-minutes: 180
    env:
      CI_IMAGE_REPOSITORY: tomato-harvest-sim-ci-base
      CI_IMAGE_TAG: cached
      # ヘッドレス実行は固定ステップ消化後に終了する（完了検知なし）。
      # ステップ消化速度はキャッシュの温まり具合で変動するため、
      # ウォームキャッシュでも収穫サイクルが完走できる余裕を持たせる。
      CI_HEADLESS_STEPS: "3600"
      CI_E2E_TIMEOUT_SEC: "2400"
      CI_ARTIFACT_ROOT: ${{ github.workspace }}/.artifacts/ci
      ACCEPT_EULA: "Y"
      PRIVACY_CONSENT: "Y"
      # tracking error外乱をplace phaseへ注入し、suffix replanが実MoveItで
      # 成功することをE2Eで検証する (Step 3/4)。pregrasp / graspへの注入は
      # 把持直前のOMPL非決定性でgrasp失敗のflakyを誘発するため常設CIから外し、
      # 必要時にオンデマンドで実行する（恒久対策はStep 6のlocal planner）。
      TOMATO_HARVEST_INJECT_SUFFIX_REPLAN_PHASES: "moving_to_place"
      # producer 複線化の検証 (Step 5): dummy local plan を place phase で1回注入し、
      # arbitration 経由の採用と収穫完走（非破綻）をE2Eで検証する。
      TOMATO_HARVEST_INJECT_LOCAL_PLAN_PHASES: "moving_to_place"
    steps:
      - name: Clean workspace residue
        run: |
          docker run --rm -v "${{ github.workspace }}:/w" alpine \
            chown -R "$(id -u):$(id -g)" /w || true
          if [ -d "${CI_CACHE_ROOT:-/tmp/tomato-harvest-sim-cache-github-actions}" ]; then
            docker run --rm -v "${CI_CACHE_ROOT:-/tmp/tomato-harvest-sim-cache-github-actions}:/c" alpine \
              chown -R "$(id -u):$(id -g)" /c || true
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare artifact root
        run: mkdir -p "${CI_ARTIFACT_ROOT}"

      - name: Login to NGC
        env:
          NGC_API_KEY: ${{ secrets.NGC_API_KEY }}
        run: |
          if [ -z "${NGC_API_KEY}" ]; then
            echo "NGC_API_KEY is not set. Skipping docker login to nvcr.io."
            exit 0
          fi
          printf '%s' "${NGC_API_KEY}" | docker login nvcr.io -u '$oauthtoken' --password-stdin

      - name: Check runner prerequisites
        run: bash ./scripts/ci/check_runner_prereqs.sh

      - name: Prepare cached CI base image
        run: bash ./scripts/ci/build_ci_image.sh

      - name: Run unit tests
        run: bash ./scripts/ci/run_unit_tests.sh

      - name: Run Isaac Sim E2E
        run: bash ./scripts/ci/run_e2e.sh

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts-${{ github.run_id }}
          path: .artifacts/ci
          if-no-files-found: warn
