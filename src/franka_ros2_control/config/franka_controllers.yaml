controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    # use_sim_time は設定しない: controller_manager の RT ループは /clock の到着に
    # ブロックされる。Isaac Sim が /clock を配信し始めるのはコントローラーの
    # activate 試行より後になるため、use_sim_time=true だと
    # "Switch controller timed out" でコントローラーが永久に inactive のまま残る。

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_trajectory_controller:
  ros__parameters:
    joints:
      - panda_joint1
      - panda_joint2
      - panda_joint3
      - panda_joint4
      - panda_joint5
      - panda_joint6
      - panda_joint7

    command_interfaces:
      - position
      - velocity

    state_interfaces:
      - position
      - velocity

    # Smooth interpolation between waypoints.
    interpolation_method: splines

    # open_loop_control: true を使う理由:
    # closed-loop (false) では JTC が「ゼロでホールド」へ速度命令を送り続けるため、
    # Isaac Sim の物理エンジンが panda_joint4 を 0 まで動かしてしまう（可動域外）。
    # open_loop_control: true ではポジション命令のみ送るため、Isaac Sim の USD
    # 関節限界クランプが働き、起動時の意図しない動きが最小になる。
    # write() 側でも URDF 境界クランプを追加してあるため多重の安全策がある。
    open_loop_control: true
    allow_partial_joints_goal: false
    allow_integration_in_goal_trajectories: true

    constraints:
      # 0.05: 速度静止判定は「腕が実際に到着して停止した」ことの確認として必須。
      # 0.0（無効化）にすると軌道時間経過で即 success となり、腕の到着前に
      # グリッパーが閉じて把持が空振りする（run13 で実測）。
      # トマト把持中の残留振動による abort は behavior_planner 側の
      # 成果ベース遷移（tomato_status / 到達距離判定）で救済する。
      stopped_velocity_tolerance: 0.05
      goal_time: 5.0
      # goal: 0.0 disables the final position tolerance check.
      # In standalone mode (no Isaac Sim), the hardware interface does not
      # simulate physics, so the robot never reaches the commanded position.
      # Setting goal to 0.0 lets the JTC declare success at trajectory end.
      panda_joint1: {goal: 0.0}
      panda_joint2: {goal: 0.0}
      panda_joint3: {goal: 0.0}
      panda_joint4: {goal: 0.0}
      panda_joint5: {goal: 0.0}
      panda_joint6: {goal: 0.0}
      panda_joint7: {goal: 0.0}
